<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        main {
            width: 300px;
            height: 400px;
            background: tomato;
        }

        div {
            width: 200px;
            height: 100px;
            border: 1px solid;
            background: yellow;
            text-align: center;
            line-height: 100px;
            box-sizing: border-box;
        }

        div:nth-of-type(2) {
            position: relative;
            left: 10px;
            top: 10px;
            background: cyan;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<main>
    <div>position: static;</div>
    <div>position: relative;</div>
    <div>position: static;</div>
</main>
</body>
</html>
