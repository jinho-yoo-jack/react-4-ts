<html lang="ko">
<head>

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <style>
        .container {
            background-color: black;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            align-content: space-around;
            height: 100%;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="item" style="background-color: red">A</div>
    <div class="item" style="background-color: orange">B</div>
    <div class="item" style="background-color: yellow">C</div>
    <div class="item" style="background-color: green">D</div>
    <div class="item" style="background-color: blue">E</div>
    <div class="item" style="background-color: violet">F</div>
    <div class="item" style="background-color: grey">G</div>
</div>
</body>
</html>
