<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        html {
            background: #989ea4;
            margin: 0;
        }

        body {
            background-color: #535bf2;
            margin: 10px;
        }

        main {
            /*position: relative;*/
            width: 300px;
            height: 400px;
            background: tomato;
        }

        div {
            width: 200px;
            height: 100px;
            border: 1px solid;
            background: yellow;
            text-align: center;
            line-height: 100px;
            box-sizing: border-box;
        }

        div:nth-of-type(2) {
            position: absolute;
            /*position: relative;*/
            top: 10px;
            left: 10px;
            /*bottom: 8px;*/
            /*right: 16px;*/
            background: cyan;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<main>
    <div>position: 1;</div>
    <div>position: 2;</div>
    <div>position: 3;</div>
</main>
</body>
</html>
