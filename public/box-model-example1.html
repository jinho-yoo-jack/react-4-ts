<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        input {
            padding: 10px;
        }
        .parent {
            display: flex;
            flex-direction: column;        }

        .one {
            background-color: red;
            width: 100px;
            height: 100px;
            margin-bottom: 50px;
        }

        .two {
            background-color: blue;
            width: 100px;
            height: 100px;
            margin-top: 100px;
        }
    </style>
</head>
<body>
<div>
    <label>
        <input type="text" name="test" placeholder="test"/>
    </label>
</div>
<div class="parent">
    <div class="one">one</div>
    <div class="two">two</div>
</div>

</body>
</html>
