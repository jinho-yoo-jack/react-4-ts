<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: 100px 200px 100px;
            grid-template-rows: 80px 120px;
            gap: 10px;
            background: #f0f0f0;
        }

        .item {
            background: coral;
            padding: 20px;
            border: 1px solid #333;
        }

        .item:nth-child(1) {
            /*grid-column-start: 1;*/
            /*grid-column-end: 3;*/
            /*grid-column: 1 / 3; !* 1~2번 열 차지 *!*/
            /*grid-column: 1 / span 2;*/

            /*grid-row-start: 1;*/
            /*grid-row-end: 2;*/
            /*grid-row: 1 / 2; !* 1번 행 차지 *!*/
            /*grid-row: 1 / span 1;*/
            background: skyblue;
        }
    </style>
</head>
<body>
<div class="grid-container">
    <div class="item">1 (넓어짐)</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
</div>

</body>
</html>
